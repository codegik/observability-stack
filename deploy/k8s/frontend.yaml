apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-frontend
  namespace: observability-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-frontend
  template:
    metadata:
      labels:
        app: loan-frontend
    spec:
      containers:
        - name: frontend
          image: localhost/loan-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: loan-frontend
  namespace: observability-stack
spec:
  type: NodePort
  selector:
    app: loan-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30088
