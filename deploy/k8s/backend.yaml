apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loan-dumps
  namespace: observability-stack
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-backend
  namespace: observability-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-backend
  template:
    metadata:
      labels:
        app: loan-backend
    spec:
      containers:
        - name: backend
          image: localhost/loan-backend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: jdbc:postgresql://loan-postgres:5432/loan
            - name: DB_USER
              value: loan
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: loan-backend
            - name: DUMP_DIR
              value: /var/dumps
            - name: LATENCY_THRESHOLD_MS
              value: "2000"
            - name: CAPTURE_COOLDOWN_MS
              value: "10000"
            - name: CAPTURE_RETAIN_N
              value: "20"
          volumeMounts:
            - name: dumps
              mountPath: /var/dumps
          readinessProbe:
            httpGet:
              path: /admin/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: dumps
          persistentVolumeClaim:
            claimName: loan-dumps
---
apiVersion: v1
kind: Service
metadata:
  name: loan-backend
  namespace: observability-stack
spec:
  selector:
    app: loan-backend
  ports:
    - port: 8080
      targetPort: 8080
