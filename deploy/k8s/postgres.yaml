apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loan-postgres-data
  namespace: observability-stack
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-postgres
  namespace: observability-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-postgres
  template:
    metadata:
      labels:
        app: loan-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: loan
            - name: POSTGRES_DB
              value: loan
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "loan", "-d", "loan"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: loan-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: loan-postgres
  namespace: observability-stack
spec:
  type: NodePort
  selector:
    app: loan-postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
