apiVersion: v1
kind: ConfigMap
metadata:
  name: loan-captures-dashboard
  namespace: observability-stack
data:
  captures.json: |
    {
      "title": "Dump Captures",
      "schemaVersion": 39,
      "version": 1,
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "type": "logs",
          "title": "Capture bundles (trigger, correlation_id, user_id)",
          "datasource": "Loki",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "options": { "showLabels": true, "showTime": true, "wrapLogMessage": true },
          "targets": [
            {
              "refId": "A",
              "datasource": "Loki",
              "expr": "{namespace=\"observability-stack\"} |= \"capture stored\" | json"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Suppressed captures (cooldown)",
          "datasource": "Loki",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "options": { "showTime": true, "wrapLogMessage": true },
          "targets": [
            {
              "refId": "A",
              "datasource": "Loki",
              "expr": "{namespace=\"observability-stack\"} |= \"capture suppressed\""
            }
          ]
        }
      ]
    }
