service:
  type: NodePort
  nodePort: 30300
grafana.ini:
  auth:
    disable_login_form: true
  auth.anonymous:
    enabled: true
    org_name: Main Org.
    org_role: Admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3100
        access: proxy
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
dashboardsConfigMaps:
  default: loan-dashboards
